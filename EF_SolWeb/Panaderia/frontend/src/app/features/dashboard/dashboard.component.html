<div class="dashboard-container">
  <h2 class="dashboard-title">Gráficos Dashboard</h2>

  <!-- Selector de gráfico -->
  <div class="chart-section">
    <label for="chartType" class="chart-label">Seleccionar gráfico:</label>
    <select id="chartType" [(ngModel)]="selectedChart" (change)="drawChart()" class="chart-select">
      <option value="salesDay">Ventas por día</option>
      <option value="salesWeek">Ventas por semana</option>
      <option value="salesMonth">Ventas por mes</option>
      <option value="topProduct">Producto más vendido</option>
      <option value="topProductWeek">Productos más vendidos - Última Semana</option>
    </select>

    <div id="chart_div" class="chart-box"></div>
  </div>

  <!-- Gráfico de productos más vendidos -->
  <mat-card class="chart-card">
    <mat-card-header>
      <div class="chart-card-header">
      </div>
    </mat-card-header>
    <mat-card-content>
      <div *ngIf="isLoadingTopProducts" class="spinner-container">
        <mat-spinner></mat-spinner>
        <p style="margin-top: 1rem; color: #666;">Cargando productos más vendidos...</p>
      </div>



  <!-- Estadísticas -->
  <div class="dashboard-stats">
    <!-- Tarjeta de Usuarios -->
    <mat-card class="stat-card mat-elevation-z4">
      <mat-card-header>
        <div mat-card-avatar class="stat-card-icon-wrapper stat-card-icon-blue">
          <mat-icon>group</mat-icon>
        </div>
        <mat-card-title>Usuarios Registrados</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <ng-container *ngIf="isLoadingUsers; else userCountDisplay">
          <mat-spinner [diameter]="30" class="stat-spinner"></mat-spinner>
        </ng-container>
        <ng-template #userCountDisplay>
          <p class="stat-number">{{ userCount !== null ? userCount : 'N/A' }}</p>
        </ng-template>
      </mat-card-content>
    </mat-card>

    <!-- Tarjeta de Productos -->
    <mat-card class="stat-card mat-elevation-z4">
      <mat-card-header>
        <div mat-card-avatar class="stat-card-icon-wrapper stat-card-icon-green">
          <mat-icon>inventory_2</mat-icon>
        </div>
        <mat-card-title>Productos en Catálogo</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <ng-container *ngIf="isLoadingProducts; else productCountDisplay">
          <mat-spinner [diameter]="30" class="stat-spinner"></mat-spinner>
        </ng-container>
        <ng-template #productCountDisplay>
          <p class="stat-number">{{ productCount !== null ? productCount : 'N/A' }}</p>
        </ng-template>
      </mat-card-content>
    </mat-card>

    <!-- Tarjeta de Ventas Totales -->
    <mat-card class="stat-card mat-elevation-z4">
      <mat-card-header>
        <div mat-card-avatar class="stat-card-icon-wrapper stat-card-icon-purple">
          <mat-icon>shopping_cart</mat-icon>
        </div>
        <mat-card-title>Ventas Registradas</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <ng-container *ngIf="isLoadingSales; else saleCountDisplay">
          <mat-spinner [diameter]="30" class="stat-spinner"></mat-spinner>
        </ng-container>
        <ng-template #saleCountDisplay>
          <p class="stat-number">{{ saleCount !== null ? saleCount : 'N/A' }}</p>
        </ng-template>
      </mat-card-content>
    </mat-card>
  </div>
   <!-- Cierre de dashboard-stats -->

  <!-- Acciones -->
  <div class="dashboard-actions">
